<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anatomy Touch Interface</title>
    <!-- Use Inter font for a minimalist clean look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="anatomy.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <!-- Fullscreen Model Viewer -->
    <div class="model-container" id="model-container">
        <model-viewer 
            id="anatomy-model"
            src="https://modelviewer.dev/shared-assets/models/NeilArmstrong.glb" 
            alt="3D Anatomy Model" 
            auto-rotate 
            camera-controls 
            disable-tap 
            interaction-prompt="none"
            shadow-intensity="1"
            environment-image="neutral">
            
            <!-- Hotspot 1: Não bộ -->
            <button class="hotspot" slot="hotspot-brain" data-position="0 1.9 0" data-normal="0 0 1">
                <div class="hotspot-dot"></div>
                <div class="hotspot-panel" id="panel-brain">
                    <h3>Não bộ (Brain)</h3>
                    <p>Trung tâm điều khiển hệ thần kinh trung ương, điều hòa cảm giác và vận động.</p>
                </div>
            </button>

            <!-- Hotspot 2: Phổi -->
            <button class="hotspot" slot="hotspot-lung" data-position="0.15 1.3 0.1" data-normal="0 0 1">
                <div class="hotspot-dot"></div>
                <div class="hotspot-panel" id="panel-lung">
                    <h3>Phổi (Lungs)</h3>
                    <p>Cơ quan hô hấp chính yếu, trao đổi khí O2 và CO2 với môi trường.</p>
                </div>
            </button>

            <!-- Hotspot 3: Tim (Heart) -->
            <button class="hotspot" slot="hotspot-heart" data-position="-0.05 1.25 0.15" data-normal="0 0 1">
                <div class="hotspot-dot"></div>
                <!-- Bảng hiển thị thông tin kế bên nội tạng -->
                <div class="hotspot-panel" id="panel-heart">
                    <h3>Tim (Heart)</h3>
                    <p>Cơ quan sinh mạng trung tâm, bơm tuần hoàn đưa máu đi nuôi cơ thể.</p>
                </div>
            </button>
            
            <!-- Hotspot 4: Gan -->
            <button class="hotspot" slot="hotspot-liver" data-position="0.1 1.05 0.15" data-normal="0 0 1">
                <div class="hotspot-dot"></div>
                <div class="hotspot-panel" id="panel-liver">
                    <h3>Gan (Liver)</h3>
                    <p>Nhà máy lọc độc tố cơ thể, chức năng lưu trữ dinh dưỡng và đào thải dịch mật.</p>
                </div>
            </button>

        </model-viewer>
    </div>

    <!-- Transparent Float UI -->
    <div class="ui-layer">

        <!-- Side Controls: Touchscreen Interactive Vertical Tabs -->
        <div class="side-controls">
            <div class="toggles-panel">
                <label class="toggle-control">
                    <input type="checkbox" class="part-toggle" value="skin">
                    <div class="toggle-button">
                        <!-- Skin (Fingerprint/Surface context) -->
                        <svg viewBox="0 0 24 24" width="34" height="34" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="toggle-icon">
                            <path d="M12 11v11"/>
                            <path d="M8 12.5a4 4 0 0 1 8 0"/>
                            <path d="M4 14.5a8 8 0 0 1 16 0"/>
                            <path d="M12 4v3"/>
                        </svg>
                        <span class="toggle-label">Da</span>
                    </div>
                </label>

                <label class="toggle-control">
                    <input type="checkbox" class="part-toggle" value="muscle">
                    <div class="toggle-button">
                        <!-- Muscle (Bicep/Flex context) -->
                        <svg viewBox="0 0 24 24" width="34" height="34" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="toggle-icon">
                            <path d="M6 14s2-6 6-6 6 6 6 6-2 6-6 6-6-6-6-6z"/>
                            <path d="M4 14h2"/>
                            <path d="M18 14h2"/>
                            <path d="M10 14h4"/>
                            <path d="M12 10v8"/>
                        </svg>
                        <span class="toggle-label">Cơ</span>
                    </div>
                </label>

                <label class="toggle-control">
                    <input type="checkbox" class="part-toggle" value="bone">
                    <div class="toggle-button">
                        <!-- Bone (Skeletal context) -->
                        <svg viewBox="0 0 24 24" width="34" height="34" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="toggle-icon">
                            <path d="M5 8c-1.66 0-3-.9-3-2s1.34-2 3-2 3 .9 3 2c0 0 2 2 4 2s4-2 4-2c1.66 0 3 .9 3 2s-1.34 2-3 2c-1.31 0-2 1-2 2v4c0 1 .69 2 2 2 1.66 0 3 .9 3 2s-1.34 2-3 2-3-.9-3-2c0 0-2-2-4-2s-4 2-4 2c-1.66 0-3-.9-3-2s1.34-2 3-2c1.31 0 2-1 2-2v-4c0-1-.69-2-2-2z"/>
                        </svg>
                        <span class="toggle-label">Xương</span>
                    </div>
                </label>

                <label class="toggle-control">
                    <input type="checkbox" class="part-toggle" value="organs" checked>
                    <div class="toggle-button">
                        <!-- Organ / Heart (Heart/Cardiology context) -->
                        <svg viewBox="0 0 24 24" width="34" height="34" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="toggle-icon">
                            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                            <path d="M12 5v5"/>
                            <path d="M8 8h8"/>
                        </svg>
                        <span class="toggle-label">Nội Tạng</span>
                    </div>
                </label>
            </div>
        </div>

    </div>

    <script src="anatomy.js"></script>
</body>
</html>
